<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Space 🔒</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/appwrite@14.0.0"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="app-container">
        <header id="chat-header" style="display: none;">
            <div class="header-top" style="display: flex; justify-content: space-between; align-items: center;">
                <!-- <div class="partner-info">
                    <h1 id="chatting-with" style="font-size: 16px; margin: 0; color: #e9edef;">Partner Name</h1>
                    <p id="online-status" style="font-size: 11px; margin: 2px 0 0 0;">checking...</p>
                </div> -->
                <div class="partner-info">
    <h1 id="chatting-with">Partner Name</h1>
    <div style="display: flex; gap: 5px; align-items: center;">
        <p id="online-status">checking...</p>
        <p id="typing-indicator" style="display: none; font-size: 11px; color: #00a884; font-style: italic;">typing...</p>
    </div>
</div>
                <button id="logout-btn" onclick="handleLogout()" style="background: #ff4b4b; color: white; border: none; padding: 6px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px;">
                    Logout
                </button>
            </div>
            <p id="user-status" style="font-size: 9px; opacity: 0.5; margin-top: 8px;"></p>
        </header>

        <div id="login-section" class="login-card">
            <h3 style="text-align: center; margin-bottom: 20px;">Secret Entry 🔒</h3>
            <input type="text" id="username" placeholder="Username..." style="width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: none; background: #2a3942; color: white;">
            <input type="password" id="password" placeholder="Password..." style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; background: #2a3942; color: white;">
            <button onclick="handleCustomLogin()" style="width: 100%; padding: 12px; border-radius: 8px; border: none; background: #00a884; color: white; cursor: pointer; font-weight: bold;">Enter Space</button>
        </div>

        <div id="main-content" style="display: none; flex-direction: column; height: 100vh;">
            <div id="chat-box" class="chat-container" style="flex: 1; overflow-y: auto; padding: 15px;">
                </div>

            <div id="image-preview-container" style="display: none; padding: 10px; background: #111b21; border-top: 1px solid #2a3942;">
                <div style="position: relative; display: inline-block;">
                    <img id="image-preview" src="" style="max-height: 100px; border-radius: 8px;">
                    <span onclick="clearImagePreview()" style="position: absolute; top: -10px; right: -10px; background: #ff4b4b; color: white; border-radius: 50%; width: 22px; height: 22px; text-align: center; cursor: pointer; line-height: 20px;">&times;</span>
                </div>
            </div>

            <div class="upload-bar" style="padding: 10px; background: #202c33; display: flex; align-items: center; gap: 10px;">
                <label for="image-input" style="cursor: pointer; color: #8696a0; font-size: 20px;"><i class="fa-solid fa-paperclip"></i></label>
                <input type="file" id="image-input" accept="image/*" style="display:none;">
                <input type="text" id="message-input" placeholder="Type a message..." style="flex: 1; padding: 10px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none;">
                <button id="send-btn" onclick="handleSendMessage()" style="background: transparent; border: none; color: #00a884; font-size: 22px; cursor: pointer;"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <div id="image-viewer" class="viewer-modal">
        <span class="close-viewer" onclick="closeViewer()">&times;</span>
        <img class="viewer-content" id="full-image">
    </div>

    <script src="script.js"></script>
</body>
</html>
